{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Tickets</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="icon" href="{% static 'img/olton.png' %}">

</head>


<body>

    <div class="cabecera">
        <h1>Tickets</h1>
        <h4>Rellene el formulario</h4>
    </div>



    <form method="POST" action="#">

        <div class="empresa">
            <p>Empresa:</p>
            <input type="text" name="empresa" required>
        </div>

        <div class="contacto">
            <p>Contacto:</p>
            <input type="text" name="contacto" required>
        </div>

        <div class="tipo_dispositivo">
            <p>Tipo de dispositivo:</p>
            <select name="tipo_dispositivo" required>
                <option value="maquina">Máquina</option>
                <option value="tracker">Tracker</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <div class="id_dispositivo">
            <p>ID dispositivo:</p>
            <input type="number" name="id_dispositivo" required>
        </div>

        <div class="observaciones">
            <p>Observaciones:</p>
            <textarea name="observaciones" rows="4" required></textarea>
            <!-- Subir archivo -->
            <input type="file" class="subir_archivo" name="archivo" accept="image/*">

        </div>

        <div class="portes">
            <p>Portes:</p>
            <select name="portes" required>
                <option value="debido">Debido</option>
                <option value="pagado">Pagado</option>
            </select>
        </div>

        <div class="transporte">
            <p>Empresa de transporte:</p>
            <input type="text" name="transporte" required>
        </div>

        <button type="submit">Enviar Ticket</button>
    </form>

    <script>
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();
            const fileInput = document.querySelector('input[name="archivo"]');
            const file = fileInput.files[0];
            if (file) {
                const extension = file.name.split('.').pop().toLowerCase();
                const allowedExtensions = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'];
                if (!allowedExtensions.includes(extension)) {
                    alert('Formato de archivo inválido');
                    return;
                }
            }
            const formData = new FormData(this);
            fetch('/tickets/', {
                method: 'POST',
                body: formData
            })
            
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                console.log('Success:', data);
                alert('Ticket creado: ' + JSON.stringify(data));
            })
            .catch((error) => {
                console.error('Error:', error);
                alert('Error al crear ticket: ' + error.message);
            });
        });
    </script>

</body>

</html>
